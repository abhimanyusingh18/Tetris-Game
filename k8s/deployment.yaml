apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-app
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tetris-app
  template:
    metadata:
      labels:
        app: tetris-app
    spec:
      containers:
      - name: tetris-app
        image: 656751414067.dkr.ecr.ap-south-1.amazonaws.com/tetris-repo:2e6eb9533dd4429a0707891b362955f9aee445e5
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 250m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 128Mi
