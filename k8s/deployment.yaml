apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-app
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tetris-app
  template:
    metadata:
      labels:
        app: tetris-app
    spec:
      containers:
      - name: tetris-app
        image: 656751414067.dkr.ecr.ap-south-1.amazonaws.com/tetris-repo:3faabd7db4b3fa16a1034b584de07ddfcafd502f
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 250m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
