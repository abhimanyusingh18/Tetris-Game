apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetris-game
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/abhimanyusingh18/Tetris-Game.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
