apiVersion: batch/v1
kind: Job
metadata:
  name: load-tester
  namespace: development
spec:
  template:
    spec:
      containers:
      - name: hey
        image: williamyeh/hey
        command: ["hey"]
        args: ["-z", "15m", "-c", "50", "http://tetris-service"]
      restartPolicy: Never
  backoffLimit: 0
